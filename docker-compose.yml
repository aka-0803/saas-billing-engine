services:
  app:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      REDIS_HOST: redis      # override: containers talk by service name, not localhost
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
